name: Build Sysext

# Unified build: produces both nvidia.raw (driver-only) and nvidia-mig.raw
# (MIG tooling + service unit) and publishes them to a single release.
# Two artifacts ride under one tag `v<truenas>-nvidia<driver>-r<run>`; the
# install script picks the right asset based on whether `--with-driver` is
# passed.

on:
  workflow_dispatch:
    inputs:
      nvidia_version:
        description: 'NVIDIA driver version (leave blank for latest tracked)'
        required: false
        default: ''
      truenas_version:
        description: 'TrueNAS version (leave blank for latest tracked)'
        required: false
        default: ''
      kernel_module_type:
        description: 'NVIDIA kernel module flavor: open or proprietary (leave blank for latest tracked)'
        required: false
        default: ''
      train_name:
        description: 'TrueNAS train / codename (leave blank for latest tracked)'
        required: false
        default: ''
      mark_latest:
        description: 'Promote this release to GitHub "Latest" (defaults to true for manual dispatches; check-releases auto-builds pass false)'
        required: false
        type: choice
        options:
          - 'true'
          - 'false'
        default: 'true'

  workflow_call:
    inputs:
      nvidia_version:
        type: string
        required: true
      truenas_version:
        type: string
        required: true
      kernel_module_type:
        type: string
        required: true
      train_name:
        type: string
        required: true
      mark_latest:
        type: string
        required: false
        default: 'false'

permissions:
  contents: write
  issues: write  # required by the auto-create hardware-test issue step (mark_latest=false path)

jobs:
  # ───────────────────────────────────────────────────────────────────────
  # resolve — single source of truth for build parameters.
  # Both build jobs and the publish job consume these outputs.
  # ───────────────────────────────────────────────────────────────────────
  resolve:
    runs-on: ubuntu-latest
    outputs:
      nvidia_version: ${{ steps.params.outputs.nvidia_version }}
      truenas_version: ${{ steps.params.outputs.truenas_version }}
      kernel_module_type: ${{ steps.params.outputs.kernel_module_type }}
      train_name: ${{ steps.params.outputs.train_name }}
      release_tag: ${{ steps.params.outputs.release_tag }}
      mark_latest: ${{ steps.params.outputs.mark_latest }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github/tracked-versions.json
          sparse-checkout-cone-mode: false

      - name: Resolve build parameters
        id: params
        env:
          INPUT_NVIDIA_VERSION: ${{ inputs.nvidia_version }}
          INPUT_TRUENAS_VERSION: ${{ inputs.truenas_version }}
          INPUT_KERNEL_MODULE_TYPE: ${{ inputs.kernel_module_type }}
          INPUT_TRAIN_NAME: ${{ inputs.train_name }}
          INPUT_MARK_LATEST: ${{ inputs.mark_latest }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail

          TRACKED=$(python3 -c "
          import json
          with open('.github/tracked-versions.json') as f:
              d = json.load(f)
          print(d['truenas']['version'])
          print(d['truenas']['train'])
          print(d['nvidia']['driver'])
          print(d['nvidia']['kernel_module_type'])
          ")
          TRACKED_TRUENAS=$(sed -n '1p' <<< "$TRACKED")
          TRACKED_TRAIN=$(sed -n '2p' <<< "$TRACKED")
          TRACKED_NVIDIA=$(sed -n '3p' <<< "$TRACKED")
          TRACKED_KMOD=$(sed -n '4p' <<< "$TRACKED")

          NVIDIA_VERSION="${INPUT_NVIDIA_VERSION:-$TRACKED_NVIDIA}"
          TRUENAS_VERSION="${INPUT_TRUENAS_VERSION:-$TRACKED_TRUENAS}"
          KERNEL_MODULE_TYPE="${INPUT_KERNEL_MODULE_TYPE:-$TRACKED_KMOD}"
          TRAIN_NAME="${INPUT_TRAIN_NAME:-$TRACKED_TRAIN}"

          # Tag policy: every build produces a unique immutable tag.
          # Format: v<truenas>-nvidia<driver>-r<run_number>
          # The unified release carries both nvidia.raw (driver-only) and
          # nvidia-mig.raw — the install script picks whichever the user
          # asked for. NVIDIA-only bumps still rebuild nvidia-mig.raw
          # (byte-equivalent to the previous build at this TrueNAS version);
          # accepted as simpler than conditional asset attachment.
          RELEASE_TAG="v${TRUENAS_VERSION}-nvidia${NVIDIA_VERSION}-r${RUN_NUMBER}"
          MARK_LATEST="${INPUT_MARK_LATEST:-true}"

          {
            echo "nvidia_version=${NVIDIA_VERSION}"
            echo "truenas_version=${TRUENAS_VERSION}"
            echo "kernel_module_type=${KERNEL_MODULE_TYPE}"
            echo "train_name=${TRAIN_NAME}"
            echo "release_tag=${RELEASE_TAG}"
            echo "mark_latest=${MARK_LATEST}"
          } >> "$GITHUB_OUTPUT"

          echo "Resolved build parameters:"
          echo "  NVIDIA:      ${NVIDIA_VERSION} (${KERNEL_MODULE_TYPE})"
          echo "  TrueNAS:     ${TRUENAS_VERSION} (${TRAIN_NAME})"
          echo "  Release tag: ${RELEASE_TAG}"
          echo "  Mark latest: ${MARK_LATEST}"

  # ───────────────────────────────────────────────────────────────────────
  # build-nvidia — driver-only nvidia.raw.
  # Hardcoded ubuntu-24.04 — see docs/build-ci-notes.md for the reasoning.
  # ───────────────────────────────────────────────────────────────────────
  build-nvidia:
    needs: resolve
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Show runner capacity
        run: |
          df -h /
          free -h
          gcc --version || true
          gcc-14 --version || true

      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential gcc-14 squashfs-tools kmod xz-utils \
            bison flex libelf-dev bc rsync libssl-dev pkg-config \
            pciutils gnupg ca-certificates wget curl

      # ── TrueNAS .update file cache ──
      # 1–3 GB; per-version cache key. Build script honors --update-file= to
      # load a pre-staged file from this path.
      - name: Restore cached TrueNAS .update
        id: update-cache
        uses: actions/cache/restore@v5
        with:
          path: /tmp/truenas.update
          key: truenas-update-${{ needs.resolve.outputs.truenas_version }}

      - name: Build nvidia.raw
        env:
          NVIDIA_VERSION: ${{ needs.resolve.outputs.nvidia_version }}
          TRUENAS_VERSION: ${{ needs.resolve.outputs.truenas_version }}
          NVIDIA_KERNEL_MODULE_TYPE: ${{ needs.resolve.outputs.kernel_module_type }}
          TRAIN_NAME: ${{ needs.resolve.outputs.train_name }}
        run: |
          ARGS=(
            --nvidia-version="$NVIDIA_VERSION"
            --truenas-version="$TRUENAS_VERSION"
            --kernel-module-type="$NVIDIA_KERNEL_MODULE_TYPE"
            --truenas-codename="$TRAIN_NAME"
            --out=dist
          )
          if [ -f /tmp/truenas.update ]; then
            ARGS+=(--update-file=/tmp/truenas.update)
          fi
          sudo -E scripts/build-nvidia-sysext.sh "${ARGS[@]}"

      - name: Save TrueNAS .update to cache
        if: steps.update-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: /tmp/truenas.update
          key: truenas-update-${{ needs.resolve.outputs.truenas_version }}

      - name: Inspect output
        run: |
          ls -la dist/
          du -h dist/nvidia.raw
          echo "SHA256: $(cat dist/nvidia.raw.sha256)"

      - name: Smoke-test nvidia.raw contents
        # Driver-only build — no MIG bits live in nvidia.raw anymore. Smoke
        # test verifies: driver userspace (nvidia-smi + the two key .so
        # families), extension-release metadata, kernel module + vermagic
        # consistency, bundled uninstaller. MIG bits are smoke-tested in
        # the build-mig job.
        run: |
          set -e
          SMOKE_TMP="$(mktemp -d)"
          trap 'rm -rf "$SMOKE_TMP"' EXIT

          unsquashfs -d "${SMOKE_TMP}/extract" dist/nvidia.raw >/dev/null

          fail=0
          require_file() {
            local rel="$1"
            local path="${SMOKE_TMP}/extract/${rel}"
            if [ ! -e "$path" ]; then
              echo "::error title=smoke-test::missing in nvidia.raw: ${rel}"
              fail=1
              return
            fi
            echo "  ok: ${rel}"
          }
          require_elf() {
            local rel="$1"
            local path="${SMOKE_TMP}/extract/${rel}"
            if [ ! -f "$path" ]; then
              echo "::error title=smoke-test::missing in nvidia.raw: ${rel}"
              fail=1
              return
            fi
            if ! file "$path" | grep -q 'ELF'; then
              echo "::error title=smoke-test::not an ELF binary: ${rel}"
              file "$path"
              fail=1
              return
            fi
            echo "  ok (ELF): ${rel}"
          }
          deny_file() {
            local rel="$1"
            local path="${SMOKE_TMP}/extract/${rel}"
            if [ -e "$path" ]; then
              echo "::error title=smoke-test::MIG bit leaked into driver-only nvidia.raw: ${rel}"
              fail=1
              return
            fi
            echo "  ok (absent): ${rel}"
          }

          echo "=== smoke-test: required paths ==="
          require_file "usr/lib/extension-release.d/extension-release.nvidia"
          require_elf  "usr/bin/nvidia-smi"

          # Versioned ELF .so files come pre-built from the NVIDIA .run.
          for lib in libnvidia-ml libcuda; do
            so_rel=$(cd "${SMOKE_TMP}/extract" && \
              find usr/lib -name "${lib}.so.*" -not -type l 2>/dev/null | head -1) || true
            if [ -z "$so_rel" ]; then
              echo "::error title=smoke-test::no concrete ${lib}.so.* found in nvidia.raw"
              fail=1
            else
              require_elf "$so_rel"
            fi
          done

          echo "=== smoke-test: MIG / uninstaller bits MUST NOT be in driver-only nvidia.raw ==="
          # Both `nvidia-mig.raw` and `nvidia.raw` get merged when --with-driver
          # is installed; any /usr path that lives in both will fail the
          # systemd-sysext merge. Keep nvidia.raw strictly driver-only.
          deny_file "usr/bin/nvidia-mig-setup"
          deny_file "usr/bin/configure-mig"
          deny_file "usr/lib/systemd/system/nvidia-mig-setup.service"
          deny_file "usr/bin/uninstall-nvidia-mig"
          deny_file "usr/bin/uninstall-nvidia-driver"

          # Kernel module + vermagic consistency.
          KVER_DIRS=$(cd "${SMOKE_TMP}/extract" && \
            find usr/lib/modules -mindepth 1 -maxdepth 1 -type d 2>/dev/null \
            | sed 's|usr/lib/modules/||')
          KVER_COUNT=$(printf '%s\n' "$KVER_DIRS" | grep -c . || true)
          if [ "$KVER_COUNT" -ne 1 ]; then
            echo "::error title=smoke-test::expected exactly one kernel dir under usr/lib/modules, got ${KVER_COUNT}: ${KVER_DIRS}"
            fail=1
          else
            KVER="$KVER_DIRS"
            echo "  found kernel-modules dir: ${KVER}"
            KO_PATH=$(find "${SMOKE_TMP}/extract/usr/lib/modules/${KVER}" \
              -name 'nvidia.ko' -not -name 'nvidia-*.ko' -type f | head -1)
            if [ -z "$KO_PATH" ]; then
              echo "::error title=smoke-test::nvidia.ko not found under usr/lib/modules/${KVER}/"
              fail=1
            else
              echo "  found nvidia.ko at: ${KO_PATH#"${SMOKE_TMP}/extract/"}"
              VERMAGIC=$(modinfo -F vermagic "$KO_PATH" 2>/dev/null || true)
              if [ -z "$VERMAGIC" ]; then
                echo "::error title=smoke-test::could not read vermagic from nvidia.ko"
                fail=1
              elif ! printf '%s' "$VERMAGIC" | grep -qF "$KVER"; then
                echo "::error title=smoke-test::nvidia.ko vermagic does not reference KVER (${KVER}); got: ${VERMAGIC}"
                fail=1
              else
                echo "  ok: nvidia.ko vermagic references ${KVER}"
              fi
            fi
          fi

          if [ "$fail" -ne 0 ]; then
            echo "::error title=smoke-test::nvidia.raw failed smoke-test — refusing to publish"
            exit 1
          fi
          echo "smoke-test OK"

      - name: Upload nvidia.raw artifact
        uses: actions/upload-artifact@v7
        with:
          name: nvidia-raw
          path: |
            dist/nvidia.raw
            dist/nvidia.raw.sha256
          if-no-files-found: error
          retention-days: 30

  # ───────────────────────────────────────────────────────────────────────
  # build-mig — lightweight nvidia-mig.raw (MIG tooling + service unit).
  # ───────────────────────────────────────────────────────────────────────
  build-mig:
    needs: resolve
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install squashfs-tools
        run: sudo apt-get update && sudo apt-get install -y squashfs-tools

      - name: Build nvidia-mig.raw
        run: scripts/build-mig-sysext.sh --out=dist/nvidia-mig.raw

      - name: Inspect contents
        run: |
          unsquashfs -l dist/nvidia-mig.raw
          ls -la dist/

      - name: Smoke-test nvidia-mig.raw contents
        # Path-presence only — no kernel module ships in nvidia-mig.raw.
        run: |
          set -e
          SMOKE_TMP="$(mktemp -d)"
          trap 'rm -rf "$SMOKE_TMP"' EXIT

          unsquashfs -d "${SMOKE_TMP}/extract" dist/nvidia-mig.raw >/dev/null

          fail=0
          require_file() {
            local rel="$1"
            local path="${SMOKE_TMP}/extract/${rel}"
            if [ ! -e "$path" ]; then
              echo "::error title=smoke-test::missing in nvidia-mig.raw: ${rel}"
              fail=1
              return
            fi
            echo "  ok: ${rel}"
          }

          echo "=== smoke-test: required paths ==="
          require_file "usr/lib/extension-release.d/extension-release.nvidia-mig"
          require_file "usr/bin/nvidia-mig-setup"
          require_file "usr/bin/configure-mig"
          require_file "usr/bin/uninstall-nvidia-mig"
          require_file "usr/lib/systemd/system/nvidia-mig-setup.service"

          if [ "$fail" -ne 0 ]; then
            echo "::error title=smoke-test::nvidia-mig.raw failed smoke-test — refusing to publish"
            exit 1
          fi
          echo "smoke-test OK"

      - name: Upload nvidia-mig.raw artifact
        uses: actions/upload-artifact@v7
        with:
          name: nvidia-mig-raw
          path: |
            dist/nvidia-mig.raw
            dist/nvidia-mig.raw.sha256
          if-no-files-found: error
          retention-days: 30

  # ───────────────────────────────────────────────────────────────────────
  # publish — single release carrying both assets.
  # ───────────────────────────────────────────────────────────────────────
  publish:
    needs: [resolve, build-nvidia, build-mig]
    runs-on: ubuntu-latest
    steps:
      - name: Download nvidia.raw artifact
        uses: actions/download-artifact@v6
        with:
          name: nvidia-raw
          path: dist

      - name: Download nvidia-mig.raw artifact
        uses: actions/download-artifact@v6
        with:
          name: nvidia-mig-raw
          path: dist

      - name: List release assets
        run: |
          ls -la dist/
          echo "nvidia.raw     SHA256: $(cat dist/nvidia.raw.sha256)"
          echo "nvidia-mig.raw SHA256: $(cat dist/nvidia-mig.raw.sha256)"

      - name: Write release notes
        env:
          NVIDIA_VERSION: ${{ needs.resolve.outputs.nvidia_version }}
          KERNEL_MODULE_TYPE: ${{ needs.resolve.outputs.kernel_module_type }}
          TRUENAS_VERSION: ${{ needs.resolve.outputs.truenas_version }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          cat > release-notes.md <<EOF
          Enables Nvidia MIG support and container mapping for MIGs. Optionally use later Nvidia drivers than the stock TrueNAS version if needed for hardware compatibility.

          The install script picks the right asset based on the flag you pass:

          - \`install-mig-sysext.sh\` (default) → installs \`nvidia-mig.raw\` on top of TrueNAS's stock driver. No reboot.
          - \`install-mig-sysext.sh --with-driver\` → installs \`nvidia.raw\` and \`nvidia-mig.raw\` (driver swap, requires reboot).

          - TrueNAS:          \`${TRUENAS_VERSION}\`
          - Optional Driver:  \`${NVIDIA_VERSION}\` (${KERNEL_MODULE_TYPE} module)
          - Run number:       ${RUN_NUMBER}
          - Source commit: \`${COMMIT_SHA}\`

          MIG Only: \`curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install-mig-sysext.sh | sudo bash\`

          MIG+Driver: \`curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install-mig-sysext.sh | sudo bash -s -- --with-driver\`
          EOF

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.resolve.outputs.release_tag }}
          name: "TrueNAS ${{ needs.resolve.outputs.truenas_version }} - NVIDIA ${{ needs.resolve.outputs.nvidia_version }} (r${{ github.run_number }})"
          body_path: release-notes.md
          files: |
            dist/nvidia.raw
            dist/nvidia.raw.sha256
            dist/nvidia-mig.raw
            dist/nvidia-mig.raw.sha256
          draft: false
          prerelease: false
          make_latest: ${{ needs.resolve.outputs.mark_latest }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ─────────────────────────────────────────────────────────────────────
      # Auto-builds (mark_latest=false) need hardware verification before
      # promotion to "Latest". One issue per release, with checklists for
      # both install paths.
      # ─────────────────────────────────────────────────────────────────────
      - name: Create hardware-test issue for auto-build
        if: needs.resolve.outputs.mark_latest == 'false'
        uses: actions/github-script@v9
        env:
          TAG: ${{ needs.resolve.outputs.release_tag }}
          TRUENAS_VERSION: ${{ needs.resolve.outputs.truenas_version }}
          NVIDIA_VERSION: ${{ needs.resolve.outputs.nvidia_version }}
          KERNEL_MODULE_TYPE: ${{ needs.resolve.outputs.kernel_module_type }}
        with:
          script: |
            const tag = process.env.TAG;
            const title = `Hardware test: TrueNAS ${process.env.TRUENAS_VERSION} / NVIDIA ${process.env.NVIDIA_VERSION} (${tag})`;
            const releaseUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/releases/tag/${tag}`;

            // Ensure the label exists (idempotent — 422 = "already exists").
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'hardware-test',
                color: 'FBCA04',
                description: 'Auto-build awaiting hardware verification',
              });
              console.log('Created hardware-test label');
            } catch (e) {
              if (e.status === 422) {
                console.log('hardware-test label already exists');
              } else {
                throw e;
              }
            }

            // Skip if an open issue already exists for this release tag.
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'hardware-test',
              per_page: 100,
            });
            if (existing.data.some(i => i.title.includes(tag))) {
              console.log(`Open hardware-test issue already exists for ${tag} — skipping`);
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              labels: ['hardware-test'],
              body: [
                `An auto-build published a new unified release that needs hardware verification before being promoted to **Latest**.`,
                ``,
                `**Release:** [${tag}](${releaseUrl})`,
                `**TrueNAS:** ${process.env.TRUENAS_VERSION}`,
                `**NVIDIA driver:** ${process.env.NVIDIA_VERSION} (${process.env.KERNEL_MODULE_TYPE} module)`,
                ``,
                `Verify whichever install variant matches the test host. If both apply, run them on separate hosts.`,
                ``,
                `### Variant A — default install (MIG on stock driver)`,
                `- [ ] Pre-flight: host has stock NVIDIA driver merged (>= 570).`,
                `- [ ] \`sudo bash -c "\$(curl -fsSL https://raw.githubusercontent.com/${context.repo.owner}/${context.repo.repo}/main/scripts/install-mig-sysext.sh)" -- --release=${tag}\``,
                `- [ ] No reboot needed; \`systemd-sysext\` merges nvidia-mig live.`,
                `- [ ] \`systemd-sysext status\` shows both \`nvidia\` (stock) and \`nvidia-mig\` merged.`,
                `- [ ] \`configure-mig\` runs to completion and creates MIG instances.`,
                `- [ ] Assign a MIG profile to a TrueNAS app; \`nvidia-smi -L\` inside the app shows the expected slice.`,
                `- [ ] Reboot and confirm MIG instances are recreated by the registered PREINIT.`,
                ``,
                `### Variant B — --with-driver install (custom driver + MIG)`,
                `- [ ] Pre-flight: stock-nvidia backup exists (\`/mnt/<pool>/.config/nvidia-gpu/nvidia-original.raw\`); run \`recover-stock-nvidia.sh\` if not.`,
                `- [ ] \`sudo bash -c "\$(curl -fsSL https://raw.githubusercontent.com/${context.repo.owner}/${context.repo.repo}/main/scripts/install-mig-sysext.sh)" -- --release=${tag} --with-driver\``,
                `- [ ] Reboot when the install script prompts.`,
                `- [ ] \`nvidia-smi\` reports the new driver version with no NVML mismatch errors.`,
                `- [ ] \`systemd-sysext status\` shows \`nvidia\` (custom) and \`nvidia-mig\` merged.`,
                `- [ ] \`midclt call initshutdownscript.query\` shows BOTH PREINITs (nvidia-preinit-driver and nvidia-mig-setup).`,
                `- [ ] \`configure-mig\` runs without errors and assigns a profile to an app.`,
                `- [ ] Reboot once more and confirm everything still works (both PREINITs re-apply).`,
                ``,
                `### Promote`,
                `Once verified, open the [release page](${releaseUrl}) and click **Set as latest**, then close this issue.`,
              ].join('\n'),
            });
            console.log(`Created hardware-test issue for ${tag}`);
