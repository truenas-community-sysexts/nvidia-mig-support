name: Build Sysext

# Builds nvidia-mig.raw (the MIG tooling + service sysext) and publishes it to
# a release tagged v<run_number>. The artifact is driver- and kernel-agnostic
# (ID=_any, no kernel module — just the MIG setup script, service unit, and
# helpers), so a single release works across TrueNAS versions and drivers.
#
# The NVIDIA driver is a separate project (nvidia-driver-support) and is NOT
# built or published here.
#
# Manual dispatch only — cut a release when the MIG tooling changes.

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-sysext-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install squashfs-tools
        run: sudo apt-get update && sudo apt-get install -y squashfs-tools

      - name: Build nvidia-mig.raw
        run: scripts/build-mig-sysext.sh --out=dist/nvidia-mig.raw

      - name: Inspect contents
        run: |
          unsquashfs -l dist/nvidia-mig.raw
          ls -la dist/

      - name: Smoke-test nvidia-mig.raw contents
        # Path-presence only — no kernel module ships in nvidia-mig.raw.
        run: |
          set -e
          SMOKE_TMP="$(mktemp -d)"
          trap 'rm -rf "$SMOKE_TMP"' EXIT

          unsquashfs -d "${SMOKE_TMP}/extract" dist/nvidia-mig.raw >/dev/null

          fail=0
          require_file() {
            local rel="$1"
            local path="${SMOKE_TMP}/extract/${rel}"
            if [ ! -e "$path" ]; then
              echo "::error title=smoke-test::missing in nvidia-mig.raw: ${rel}"
              fail=1
              return
            fi
            echo "  ok: ${rel}"
          }

          echo "=== smoke-test: required paths ==="
          require_file "usr/lib/extension-release.d/extension-release.nvidia-mig"
          require_file "usr/bin/nvidia-mig-setup"
          require_file "usr/bin/configure-mig"
          require_file "usr/bin/uninstall-nvidia-mig"
          require_file "usr/lib/systemd/system/nvidia-mig-setup.service"

          if [ "$fail" -ne 0 ]; then
            echo "::error title=smoke-test::nvidia-mig.raw failed smoke-test — refusing to publish"
            exit 1
          fi
          echo "smoke-test OK"

      - name: Write release notes
        env:
          RUN_NUMBER: ${{ github.run_number }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          cat > release-notes.md <<EOF
          Enables NVIDIA MIG support and MIG-device container mapping on TrueNAS.

          \`nvidia-mig.raw\` is a lightweight, driver- and kernel-agnostic sysext
          (\`ID=_any\`) — it layers MIG tooling on top of whatever NVIDIA driver is
          already present and needs no reboot.

          Install (MIG on the existing driver):
          \`curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install-mig-sysext.sh | sudo bash\`

          MIG requires a driver new enough to expose it (major >= 570 — the driver
          shipped in the latest TrueNAS 25). To run a newer/specific driver, install
          it first via [nvidia-driver-support](https://github.com/${{ github.repository_owner }}/nvidia-driver-support), then install MIG on top.

          - Run number:    ${RUN_NUMBER}
          - Source commit: \`${COMMIT_SHA}\`
          EOF

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ github.run_number }}
          name: "Nvidia Mig Support v${{ github.run_number }}"
          body_path: release-notes.md
          files: |
            dist/nvidia-mig.raw
            dist/nvidia-mig.raw.sha256
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
