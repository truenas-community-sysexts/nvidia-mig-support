name: Build Sysext

# Builds nvidia-mig.raw (the MIG tooling + service sysext) and publishes it to
# a release tagged v<run_number>. The artifact is driver- and kernel-agnostic
# (ID=_any, no kernel module — just the MIG setup script, service unit, and
# helpers), so a single release works across TrueNAS versions and drivers.
#
# The NVIDIA driver is a separate project (nvidia-driver-support) and is NOT
# built or published here.
#
# Manual dispatch only — cut a release when the MIG tooling changes.

on:
  workflow_dispatch:
    inputs:
      mark_latest:
        description: 'true = publish straight to Latest; false (default) = prerelease + hardware-test gate'
        required: false
        type: choice
        options:
          - 'true'
          - 'false'
        default: 'false'

permissions:
  contents: write
  issues: write

concurrency:
  group: build-sysext-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install squashfs-tools
        run: sudo apt-get update && sudo apt-get install -y squashfs-tools

      - name: Build nvidia-mig.raw
        run: scripts/build-mig-sysext.sh --out=dist/nvidia-mig.raw

      - name: Inspect contents
        run: |
          unsquashfs -l dist/nvidia-mig.raw
          ls -la dist/

      - name: Smoke-test nvidia-mig.raw contents
        # Path-presence only — no kernel module ships in nvidia-mig.raw.
        run: |
          set -e
          SMOKE_TMP="$(mktemp -d)"
          trap 'rm -rf "$SMOKE_TMP"' EXIT

          unsquashfs -d "${SMOKE_TMP}/extract" dist/nvidia-mig.raw >/dev/null

          fail=0
          require_file() {
            local rel="$1"
            local path="${SMOKE_TMP}/extract/${rel}"
            if [ ! -e "$path" ]; then
              echo "::error title=smoke-test::missing in nvidia-mig.raw: ${rel}"
              fail=1
              return
            fi
            echo "  ok: ${rel}"
          }

          echo "=== smoke-test: required paths ==="
          require_file "usr/lib/extension-release.d/extension-release.nvidia-mig"
          require_file "usr/bin/nvidia-mig-setup"
          require_file "usr/bin/configure-mig"
          require_file "usr/bin/uninstall-nvidia-mig"
          require_file "usr/lib/systemd/system/nvidia-mig-setup.service"

          if [ "$fail" -ne 0 ]; then
            echo "::error title=smoke-test::nvidia-mig.raw failed smoke-test — refusing to publish"
            exit 1
          fi
          echo "smoke-test OK"

      - name: Write release notes
        env:
          RUN_NUMBER: ${{ github.run_number }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          cat > release-notes.md <<EOF
          Enables NVIDIA MIG support and MIG-device container mapping on TrueNAS.

          \`nvidia-mig.raw\` is a lightweight, driver- and kernel-agnostic sysext
          (\`ID=_any\`) — it layers MIG tooling on top of whatever NVIDIA driver is
          already present and needs no reboot.

          Install (MIG on the existing driver):
          \`curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install-mig-sysext.sh | sudo bash\`

          MIG requires a driver new enough to expose it (major >= 570 — the driver
          shipped in the latest TrueNAS 25). To run a newer/specific driver, install
          it first via [nvidia-driver-support](https://github.com/${{ github.repository_owner }}/nvidia-driver-support), then install MIG on top.

          - Run number:    ${RUN_NUMBER}
          - Source commit: \`${COMMIT_SHA}\`
          EOF

      # Create the release as a DRAFT first. On immutable-release repos GitHub
      # only accepts asset uploads before a release is published, so we attach
      # nvidia-mig.raw to the draft, then publish it in the next step.
      - name: Create draft release with assets
        id: release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ github.run_number }}
          name: "Nvidia Mig Support v${{ github.run_number }}"
          body_path: release-notes.md
          files: |
            dist/nvidia-mig.raw
            dist/nvidia-mig.raw.sha256
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Publish the draft. Default (mark_latest=false): publish as a PRERELEASE
      # gated behind a hardware-test issue (promote.yml flips it to Latest when
      # the issue is closed). Override mark_latest=true: publish straight to
      # Latest. Editing these flags is allowed even on immutable releases; only
      # the assets/tag are locked once published.
      - name: Publish the draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          REL_ID: ${{ steps.release.outputs.id }}
          MARK_LATEST: ${{ inputs.mark_latest }}
        run: |
          if [ "$MARK_LATEST" = "true" ]; then
            gh api --method PATCH "repos/${REPO}/releases/${REL_ID}" -F draft=false -f make_latest=true
            echo "Published v${{ github.run_number }} straight to Latest"
          else
            gh api --method PATCH "repos/${REPO}/releases/${REL_ID}" -F draft=false -F prerelease=true
            echo "Published v${{ github.run_number }} as a prerelease (hardware-test gate)"
          fi

      - name: Open hardware-test issue (prerelease gate)
        if: inputs.mark_latest != 'true'
        uses: actions/github-script@v9
        env:
          RUN_NUMBER: ${{ github.run_number }}
        with:
          script: |
            const tag = `v${process.env.RUN_NUMBER}`;
            const { owner, repo } = context.repo;
            const releaseUrl = `https://github.com/${owner}/${repo}/releases/tag/${tag}`;
            const title = `Hardware test: nvidia-mig ${tag}`;
            try {
              await github.rest.issues.createLabel({ owner, repo, name: 'hardware-test',
                color: 'FBCA04', description: 'Build awaiting verification on real hardware' });
            } catch (e) { if (e.status !== 422) throw e; }
            const existing = await github.rest.issues.listForRepo({ owner, repo,
              state: 'open', labels: 'hardware-test', per_page: 100 });
            if (existing.data.some(i => i.title.includes(tag))) {
              console.log(`Open hardware-test issue already exists for ${tag}, skipping`); return;
            }
            await github.rest.issues.create({ owner, repo, title, labels: ['hardware-test'],
              body: [
                `A new prerelease of the MIG tooling sysext needs verification before promotion to **Latest**.`,
                ``,
                `**Release:** [${tag}](${releaseUrl})`,
                `<!-- release-tag: ${tag} -->`,
                ``,
                `### Install THIS build to test it`,
                `It is a **pre-release**, so the default install fetches the current Latest, not this build. Pin this build with \`--release\`:`,
                "```bash",
                `curl -fsSL https://raw.githubusercontent.com/${owner}/${repo}/main/scripts/install-mig-sysext.sh | sudo bash -s -- --release=${tag}`,
                "```",
                ``,
                `### Test checklist`,
                `- [ ] Install on a TrueNAS box with an NVIDIA GPU + driver (major >= 570)`,
                `- [ ] \`systemctl status nvidia-mig-setup\` is active`,
                `- [ ] MIG profiles can be listed/configured (\`nvidia-smi mig -lgip\`)`,
                `- [ ] A MIG device maps into an app/container as expected`,
                ``,
                `### Promote`,
                `This build is published as a **pre-release**. Once verified, **close this issue as completed** — that automatically promotes [\`${tag}\`](${releaseUrl}) to the latest release and appends the changelog.`,
              ].join('\n') });
            console.log(`Created hardware-test issue for ${tag}`);
