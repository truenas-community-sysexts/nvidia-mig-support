name: Build MIG Sysext

on:
  workflow_dispatch:
    inputs:
      truenas_version:
        description: 'TrueNAS version (leave blank for latest tracked)'
        required: false
        default: ''
      train_name:
        description: 'TrueNAS train / codename (leave blank for latest tracked)'
        required: false
        default: ''
  push:
    branches:
      - main
    paths:
      - 'sysext/**'
      - 'scripts/build-mig-sysext.sh'
      - 'scripts/configure-mig.sh'
      - '.github/workflows/build-mig-sysext.yml'
      - '.github/tracked-versions.json'

permissions:
  contents: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      truenas_version: ${{ steps.params.outputs.truenas_version }}
      train_name: ${{ steps.params.outputs.train_name }}
      release_tag: ${{ steps.params.outputs.release_tag }}
      is_prerelease: ${{ steps.params.outputs.is_prerelease }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github/tracked-versions.json
          sparse-checkout-cone-mode: false

      - name: Resolve build parameters
        id: params
        env:
          INPUT_TRUENAS_VERSION: ${{ inputs.truenas_version }}
          INPUT_TRAIN_NAME: ${{ inputs.train_name }}
          EVENT_NAME: ${{ github.event_name }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail

          TRACKED=$(python3 -c "
          import json
          with open('.github/tracked-versions.json') as f:
              d = json.load(f)
          print(d['truenas']['version'])
          print(d['truenas']['train'])
          ")
          TRACKED_TRUENAS=$(sed -n '1p' <<< "$TRACKED")
          TRACKED_TRAIN=$(sed -n '2p' <<< "$TRACKED")

          TRUENAS_VERSION="${INPUT_TRUENAS_VERSION:-$TRACKED_TRUENAS}"
          TRAIN_NAME="${INPUT_TRAIN_NAME:-$TRACKED_TRAIN}"

          # Tag policy (mirrors build-nvidia-sysext.yml):
          # - push to main      → dev-mig-sysext (rolling, mutable, prerelease)
          # - workflow_dispatch → v<truenas>-mig-r<run> (immutable, prerelease until promoted)
          # MIG sysext content is TrueNAS-version-independent, but the tag includes
          # TrueNAS for consumer context (which release pairs with which TrueNAS).
          if [ "$EVENT_NAME" = "push" ]; then
            RELEASE_TAG="dev-mig-sysext"
            IS_PRERELEASE="true"
          else
            RELEASE_TAG="v${TRUENAS_VERSION}-mig-r${RUN_NUMBER}"
            IS_PRERELEASE="true"
          fi

          {
            echo "truenas_version=${TRUENAS_VERSION}"
            echo "train_name=${TRAIN_NAME}"
            echo "release_tag=${RELEASE_TAG}"
            echo "is_prerelease=${IS_PRERELEASE}"
          } >> "$GITHUB_OUTPUT"

          echo "Resolved build parameters:"
          echo "  TrueNAS:  ${TRUENAS_VERSION} (${TRAIN_NAME})"
          echo "  Release:  ${RELEASE_TAG} (prerelease=${IS_PRERELEASE})"

  build:
    needs: resolve
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install squashfs-tools
        run: sudo apt-get update && sudo apt-get install -y squashfs-tools

      - name: Build nvidia-mig.raw
        run: scripts/build-mig-sysext.sh --out=dist/nvidia-mig.raw

      - name: Inspect contents
        run: |
          unsquashfs -l dist/nvidia-mig.raw
          ls -la dist/

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: nvidia-mig-sysext-${{ needs.resolve.outputs.truenas_version }}
          path: |
            dist/nvidia-mig.raw
            dist/nvidia-mig.raw.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.resolve.outputs.release_tag }}
          IS_PRERELEASE: ${{ needs.resolve.outputs.is_prerelease }}
          TRUENAS_VERSION: ${{ needs.resolve.outputs.truenas_version }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          NOTES="Lightweight MIG sysext. Pairs with TrueNAS stock nvidia.raw (driver >= 570).

          TrueNAS:       ${TRUENAS_VERSION}
          Run number:    ${RUN_NUMBER}
          Source commit: ${COMMIT_SHA}"

          PRERELEASE_FLAG=""
          if [ "$IS_PRERELEASE" = "true" ]; then PRERELEASE_FLAG="--prerelease"; fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/nvidia-mig.raw dist/nvidia-mig.raw.sha256 --clobber
            # shellcheck disable=SC2086 # PRERELEASE_FLAG is intentionally word-split
            gh release edit "$TAG" --notes "$NOTES" --target "$COMMIT_SHA" $PRERELEASE_FLAG
          else
            # shellcheck disable=SC2086 # PRERELEASE_FLAG is intentionally word-split
            gh release create "$TAG" dist/nvidia-mig.raw dist/nvidia-mig.raw.sha256 \
              --title "$TAG" --notes "$NOTES" --target "$COMMIT_SHA" $PRERELEASE_FLAG
          fi
