name: Build MIG Sysext

on:
  workflow_dispatch:
    inputs:
      truenas_version:
        description: 'TrueNAS version (leave blank for latest tracked)'
        required: false
        default: ''
      train_name:
        description: 'TrueNAS train / codename (leave blank for latest tracked)'
        required: false
        default: ''
      mark_latest:
        description: 'Promote this release to GitHub "Latest" (defaults to true for manual dispatches)'
        required: false
        type: choice
        options:
          - 'true'
          - 'false'
        default: 'true'

  workflow_call:
    inputs:
      truenas_version:
        type: string
        required: true
      train_name:
        type: string
        required: true
      mark_latest:
        type: string
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      truenas_version: ${{ steps.params.outputs.truenas_version }}
      train_name: ${{ steps.params.outputs.train_name }}
      release_tag: ${{ steps.params.outputs.release_tag }}
      mark_latest: ${{ steps.params.outputs.mark_latest }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github/tracked-versions.json
          sparse-checkout-cone-mode: false

      - name: Resolve build parameters
        id: params
        env:
          INPUT_TRUENAS_VERSION: ${{ inputs.truenas_version }}
          INPUT_TRAIN_NAME: ${{ inputs.train_name }}
          INPUT_MARK_LATEST: ${{ inputs.mark_latest }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail

          TRACKED=$(python3 -c "
          import json
          with open('.github/tracked-versions.json') as f:
              d = json.load(f)
          print(d['truenas']['version'])
          print(d['truenas']['train'])
          ")
          TRACKED_TRUENAS=$(sed -n '1p' <<< "$TRACKED")
          TRACKED_TRAIN=$(sed -n '2p' <<< "$TRACKED")

          TRUENAS_VERSION="${INPUT_TRUENAS_VERSION:-$TRACKED_TRUENAS}"
          TRAIN_NAME="${INPUT_TRAIN_NAME:-$TRACKED_TRAIN}"

          # Tag policy: every build produces a unique immutable tag.
          # Format: v<truenas>-mig-r<run_number>
          # MIG sysext content is TrueNAS-version-independent, but the tag
          # includes TrueNAS for consumer context (which release pairs with
          # which TrueNAS).
          RELEASE_TAG="v${TRUENAS_VERSION}-mig-r${RUN_NUMBER}"
          MARK_LATEST="${INPUT_MARK_LATEST:-true}"

          {
            echo "truenas_version=${TRUENAS_VERSION}"
            echo "train_name=${TRAIN_NAME}"
            echo "release_tag=${RELEASE_TAG}"
            echo "mark_latest=${MARK_LATEST}"
          } >> "$GITHUB_OUTPUT"

          echo "Resolved build parameters:"
          echo "  TrueNAS:     ${TRUENAS_VERSION} (${TRAIN_NAME})"
          echo "  Release tag: ${RELEASE_TAG}"
          echo "  Mark latest: ${MARK_LATEST}"

  build:
    needs: resolve
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install squashfs-tools
        run: sudo apt-get update && sudo apt-get install -y squashfs-tools

      - name: Build nvidia-mig.raw
        run: scripts/build-mig-sysext.sh --out=dist/nvidia-mig.raw

      - name: Inspect contents
        run: |
          unsquashfs -l dist/nvidia-mig.raw
          ls -la dist/

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: nvidia-mig-sysext-${{ needs.resolve.outputs.truenas_version }}
          path: |
            dist/nvidia-mig.raw
            dist/nvidia-mig.raw.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Write release notes
        env:
          TRUENAS_VERSION: ${{ needs.resolve.outputs.truenas_version }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          cat > release-notes.md <<EOF
          Lightweight MIG sysext. Pairs with TrueNAS stock nvidia.raw (driver >= 570).

          - TrueNAS:       \`${TRUENAS_VERSION}\`
          - Run number:    ${RUN_NUMBER}
          - Source commit: \`${COMMIT_SHA}\`

          Install: \`curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install-mig-sysext.sh | sudo bash\`
          EOF

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.resolve.outputs.release_tag }}
          name: "TrueNAS ${{ needs.resolve.outputs.truenas_version }} - MIG sysext (r${{ github.run_number }})"
          body_path: release-notes.md
          files: |
            dist/nvidia-mig.raw
            dist/nvidia-mig.raw.sha256
          draft: false
          prerelease: false
          make_latest: ${{ needs.resolve.outputs.mark_latest }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
