name: Build Full NVIDIA Sysext

on:
  workflow_dispatch:
    inputs:
      nvidia_version:
        description: 'NVIDIA driver version (leave blank for latest tracked)'
        required: false
        default: ''
      truenas_version:
        description: 'TrueNAS version (leave blank for latest tracked)'
        required: false
        default: ''
      kernel_module_type:
        description: 'NVIDIA kernel module flavor: open or proprietary (leave blank for latest tracked)'
        required: false
        default: ''
      train_name:
        description: 'TrueNAS train / codename (leave blank for latest tracked)'
        required: false
        default: ''
      bundle_mig:
        description: 'Bundle the MIG script + service into the sysext'
        required: true
        type: boolean
        default: true
      mark_latest:
        description: 'Promote this release to GitHub "Latest" (defaults to true for manual dispatches; Phase 4 check-releases will pass false for auto-builds)'
        required: false
        type: choice
        options:
          - 'true'
          - 'false'
        default: 'true'

  workflow_call:
    inputs:
      nvidia_version:
        type: string
        required: true
      truenas_version:
        type: string
        required: true
      kernel_module_type:
        type: string
        required: true
      train_name:
        type: string
        required: true
      bundle_mig:
        type: boolean
        required: false
        default: true
      mark_latest:
        type: string
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      nvidia_version: ${{ steps.params.outputs.nvidia_version }}
      truenas_version: ${{ steps.params.outputs.truenas_version }}
      kernel_module_type: ${{ steps.params.outputs.kernel_module_type }}
      train_name: ${{ steps.params.outputs.train_name }}
      bundle_mig: ${{ steps.params.outputs.bundle_mig }}
      release_tag: ${{ steps.params.outputs.release_tag }}
      mark_latest: ${{ steps.params.outputs.mark_latest }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github/tracked-versions.json
          sparse-checkout-cone-mode: false

      - name: Resolve build parameters
        id: params
        env:
          INPUT_NVIDIA_VERSION: ${{ inputs.nvidia_version }}
          INPUT_TRUENAS_VERSION: ${{ inputs.truenas_version }}
          INPUT_KERNEL_MODULE_TYPE: ${{ inputs.kernel_module_type }}
          INPUT_TRAIN_NAME: ${{ inputs.train_name }}
          INPUT_BUNDLE_MIG: ${{ inputs.bundle_mig }}
          INPUT_MARK_LATEST: ${{ inputs.mark_latest }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail

          TRACKED=$(python3 -c "
          import json
          with open('.github/tracked-versions.json') as f:
              d = json.load(f)
          print(d['truenas']['version'])
          print(d['truenas']['train'])
          print(d['nvidia']['driver'])
          print(d['nvidia']['kernel_module_type'])
          ")
          TRACKED_TRUENAS=$(sed -n '1p' <<< "$TRACKED")
          TRACKED_TRAIN=$(sed -n '2p' <<< "$TRACKED")
          TRACKED_NVIDIA=$(sed -n '3p' <<< "$TRACKED")
          TRACKED_KMOD=$(sed -n '4p' <<< "$TRACKED")

          NVIDIA_VERSION="${INPUT_NVIDIA_VERSION:-$TRACKED_NVIDIA}"
          TRUENAS_VERSION="${INPUT_TRUENAS_VERSION:-$TRACKED_TRUENAS}"
          KERNEL_MODULE_TYPE="${INPUT_KERNEL_MODULE_TYPE:-$TRACKED_KMOD}"
          TRAIN_NAME="${INPUT_TRAIN_NAME:-$TRACKED_TRAIN}"
          BUNDLE_MIG="${INPUT_BUNDLE_MIG:-true}"

          # Tag policy: every build produces a unique immutable tag.
          # Format: v<truenas>-nvidia<driver>-r<run_number>
          # run_number is monotonic per workflow, so retries on the same
          # commit get unique tags — sidesteps GitHub's immutable-release
          # tag-burn. mark_latest controls whether the release is promoted
          # to GitHub "Latest"; defaults true for manual dispatches and
          # false for Phase 4 auto-builds (set by workflow_call caller).
          RELEASE_TAG="v${TRUENAS_VERSION}-nvidia${NVIDIA_VERSION}-r${RUN_NUMBER}"
          MARK_LATEST="${INPUT_MARK_LATEST:-true}"

          {
            echo "nvidia_version=${NVIDIA_VERSION}"
            echo "truenas_version=${TRUENAS_VERSION}"
            echo "kernel_module_type=${KERNEL_MODULE_TYPE}"
            echo "train_name=${TRAIN_NAME}"
            echo "bundle_mig=${BUNDLE_MIG}"
            echo "release_tag=${RELEASE_TAG}"
            echo "mark_latest=${MARK_LATEST}"
          } >> "$GITHUB_OUTPUT"

          echo "Resolved build parameters:"
          echo "  NVIDIA:      ${NVIDIA_VERSION} (${KERNEL_MODULE_TYPE})"
          echo "  TrueNAS:     ${TRUENAS_VERSION} (${TRAIN_NAME})"
          echo "  Bundle MIG:  ${BUNDLE_MIG}"
          echo "  Release tag: ${RELEASE_TAG}"
          echo "  Mark latest: ${MARK_LATEST}"

  build:
    needs: resolve
    # Hardcoded ubuntu-24.04 (not dynamically resolved like hailo) — see
    # docs/build-ci-notes.md for the reasoning. Short version: nvidia
    # doesn't have hailo's runner-GLIBC-vs-target-GLIBC constraint, but
    # does require modern gcc (gcc-14 for -fmin-function-alignment=16)
    # which ubuntu-22.04 doesn't ship by default.
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Show runner capacity
        run: |
          df -h /
          free -h
          gcc --version || true
          gcc-14 --version || true

      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential gcc-14 squashfs-tools kmod xz-utils \
            bison flex libelf-dev bc rsync libssl-dev pkg-config \
            pciutils gnupg ca-certificates wget curl

      # ── TrueNAS .update file cache ──
      # The .update is 1–3 GB; caching it on a per-version key makes
      # repeated builds of the same TrueNAS version skip the download.
      # The build script honors `--update-file=` to load a pre-staged
      # file from this path; see scripts/build-nvidia-sysext.sh.
      - name: Restore cached TrueNAS .update
        id: update-cache
        uses: actions/cache/restore@v5
        with:
          path: /tmp/truenas.update
          key: truenas-update-${{ needs.resolve.outputs.truenas_version }}

      - name: Build nvidia.raw
        env:
          NVIDIA_VERSION: ${{ needs.resolve.outputs.nvidia_version }}
          TRUENAS_VERSION: ${{ needs.resolve.outputs.truenas_version }}
          NVIDIA_KERNEL_MODULE_TYPE: ${{ needs.resolve.outputs.kernel_module_type }}
          TRAIN_NAME: ${{ needs.resolve.outputs.train_name }}
          BUNDLE_MIG: ${{ needs.resolve.outputs.bundle_mig }}
        run: |
          ARGS=(
            --nvidia-version="$NVIDIA_VERSION"
            --truenas-version="$TRUENAS_VERSION"
            --kernel-module-type="$NVIDIA_KERNEL_MODULE_TYPE"
            --truenas-codename="$TRAIN_NAME"
            --out=dist
          )
          if [ -f /tmp/truenas.update ]; then
            ARGS+=(--update-file=/tmp/truenas.update)
          fi
          if [ "$BUNDLE_MIG" = "false" ]; then ARGS+=(--no-mig-bundle); fi
          sudo -E scripts/build-nvidia-sysext.sh "${ARGS[@]}"

      - name: Save TrueNAS .update to cache
        # Save AFTER the build script has downloaded /tmp/truenas.update on
        # a cache miss. Placed here (not next to Restore) so the file exists
        # when Save runs. On cache hit, no save needed. If the build fails
        # after the download, the save is skipped — one re-download next run
        # is an acceptable cost. (Matches hailo's pattern.)
        if: steps.update-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: /tmp/truenas.update
          key: truenas-update-${{ needs.resolve.outputs.truenas_version }}

      - name: Inspect output
        run: |
          ls -la dist/
          du -h dist/nvidia.raw
          echo "SHA256: $(cat dist/nvidia.raw.sha256)"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: nvidia-sysext-${{ needs.resolve.outputs.nvidia_version }}-truenas-${{ needs.resolve.outputs.truenas_version }}
          path: |
            dist/nvidia.raw
            dist/nvidia.raw.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Write release notes
        env:
          NVIDIA_VERSION: ${{ needs.resolve.outputs.nvidia_version }}
          KERNEL_MODULE_TYPE: ${{ needs.resolve.outputs.kernel_module_type }}
          TRUENAS_VERSION: ${{ needs.resolve.outputs.truenas_version }}
          BUNDLE_MIG: ${{ needs.resolve.outputs.bundle_mig }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          cat > release-notes.md <<EOF
          Full-driver nvidia.raw sysext.

          - Driver:        \`${NVIDIA_VERSION}\` (${KERNEL_MODULE_TYPE} module)
          - TrueNAS:       \`${TRUENAS_VERSION}\`
          - MIG bundled:   ${BUNDLE_MIG}
          - Run number:    ${RUN_NUMBER}
          - Source commit: \`${COMMIT_SHA}\`

          Install: \`curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install-nvidia-sysext.sh | sudo bash\`
          EOF

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          # -r<run> suffix: every invocation gets a unique tag so nothing
          # collides with GitHub's immutable-release tag-burn behavior.
          # github.run_number is monotonic per workflow, so it also covers
          # the same-commit re-dispatch case (manual retry after a transient
          # failure) where a SHA alone wouldn't change.
          tag_name: ${{ needs.resolve.outputs.release_tag }}
          name: "TrueNAS ${{ needs.resolve.outputs.truenas_version }} - NVIDIA ${{ needs.resolve.outputs.nvidia_version }} (r${{ github.run_number }})"
          body_path: release-notes.md
          files: |
            dist/nvidia.raw
            dist/nvidia.raw.sha256
          draft: false
          prerelease: false
          # When mark_latest=false the release is created but not promoted
          # to "Latest" — Phase 4's auto-build path will set this to false
          # so unverified auto-builds don't displace a known-good Latest.
          make_latest: ${{ needs.resolve.outputs.mark_latest }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ─────────────────────────────────────────────────────────────────────
      # Auto-builds (check-releases.yml passes mark_latest=false) need to be
      # verified on real hardware before being promoted to "Latest". This
      # step opens a tracked issue with a per-build checklist; closing it
      # corresponds to "promoted" in the operator's workflow. Idempotent —
      # skips if an open issue for this tag already exists.
      # Mirrors hailo8-support's pattern.
      # ─────────────────────────────────────────────────────────────────────
      - name: Create hardware-test issue for auto-build
        if: needs.resolve.outputs.mark_latest == 'false'
        uses: actions/github-script@v9
        env:
          TAG: ${{ needs.resolve.outputs.release_tag }}
          TRUENAS_VERSION: ${{ needs.resolve.outputs.truenas_version }}
          NVIDIA_VERSION: ${{ needs.resolve.outputs.nvidia_version }}
          KERNEL_MODULE_TYPE: ${{ needs.resolve.outputs.kernel_module_type }}
          BUNDLE_MIG: ${{ needs.resolve.outputs.bundle_mig }}
        with:
          script: |
            const tag = process.env.TAG;
            const title = `Hardware test: TrueNAS ${process.env.TRUENAS_VERSION} / NVIDIA ${process.env.NVIDIA_VERSION} (${tag})`;
            const releaseUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/releases/tag/${tag}`;

            // Ensure the label exists (idempotent — 422 = "already exists").
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'hardware-test',
                color: 'FBCA04',
                description: 'Auto-build awaiting hardware verification',
              });
              console.log('Created hardware-test label');
            } catch (e) {
              if (e.status === 422) {
                console.log('hardware-test label already exists');
              } else {
                throw e;
              }
            }

            // Skip if an open issue already exists for this release tag.
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'hardware-test',
              per_page: 100,
            });
            if (existing.data.some(i => i.title.includes(tag))) {
              console.log(`Open hardware-test issue already exists for ${tag} — skipping`);
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              labels: ['hardware-test'],
              body: [
                `An auto-build published a new full-driver nvidia.raw release that needs hardware verification before being promoted to **Latest**.`,
                ``,
                `**Release:** [${tag}](${releaseUrl})`,
                `**TrueNAS:** ${process.env.TRUENAS_VERSION}`,
                `**NVIDIA driver:** ${process.env.NVIDIA_VERSION} (${process.env.KERNEL_MODULE_TYPE} module)`,
                `**MIG bundled:** ${process.env.BUNDLE_MIG}`,
                ``,
                `### Pre-flight`,
                `- [ ] Confirm the host has a stock-nvidia backup (\`/mnt/<pool>/.config/nvidia-gpu/nvidia-original.raw\`); run \`recover-stock-nvidia.sh\` if not.`,
                ``,
                `### Install`,
                `- [ ] \`sudo bash -c "\$(curl -fsSL https://raw.githubusercontent.com/${context.repo.owner}/${context.repo.repo}/main/scripts/install-nvidia-sysext.sh)" -- --release=${tag}\``,
                `- [ ] Reboot when the install script prompts.`,
                ``,
                `### Verify`,
                `- [ ] \`nvidia-smi\` reports the new driver version with no NVML mismatch errors.`,
                `- [ ] \`systemd-sysext status\` shows \`nvidia\` merged.`,
                `- [ ] \`midclt call system.advanced.config | grep preinit\` shows the registered PREINIT script.`,
                `- [ ] If \`BUNDLE_MIG=true\`: \`configure-mig\` runs without errors and assigns a profile to an app.`,
                `- [ ] Reboot once more and confirm everything still works (PREINIT re-applies).`,
                ``,
                `### Promote`,
                `Once verified, open the [release page](${releaseUrl}) and click **Set as latest**, then close this issue.`,
              ].join('\n'),
            });
            console.log(`Created hardware-test issue for ${tag}`);
