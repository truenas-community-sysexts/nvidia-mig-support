name: Lint

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**.sh'
      - '.github/scripts/**.sh'
      - '.github/workflows/**.yml'
      - '.github/tracked-versions.json'
  pull_request:
    paths:
      - 'scripts/**.sh'
      - '.github/scripts/**.sh'
      - '.github/workflows/**.yml'
      - '.github/tracked-versions.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shellcheck:
    name: shellcheck shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run shellcheck
        run: |
          shellcheck --severity=warning \
            scripts/build-nvidia-sysext.sh \
            scripts/build-mig-sysext.sh \
            scripts/build-on-host.sh \
            scripts/install-mig-sysext.sh \
            scripts/uninstall-mig-sysext.sh \
            scripts/configure-mig.sh \
            scripts/recover-stock-nvidia.sh \
            scripts/nvidia-preinit-driver.sh \
            .github/scripts/*.sh

  tracked-versions:
    name: tracked-versions.json shape
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: .github/scripts/validate-tracked-versions.sh

  actionlint:
    name: actionlint workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download actionlint
        # Pinned download script from upstream. actionlint auto-runs
        # shellcheck against `run:` blocks when shellcheck is on PATH —
        # ubuntu-latest preinstalls it — so this also catches issues in
        # workflow inline shell that the standalone shellcheck job
        # doesn't see.
        run: bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
      - name: Run actionlint
        # Match the standalone shellcheck job's severity (--severity=warning)
        # so the two lints agree on what counts as a finding.
        run: ./actionlint -color -shellcheck "shellcheck --severity=warning"
